upstream api {
    server api-1:3000;
    server api-2:3000;
}

# Shared memory zones for rate / connection limiting (http context via http.d include).
limit_req_zone $binary_remote_addr zone=api_global:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

log_format noquerystring '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $uri HTTP/$server_protocol" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent"';

server {
    listen 80;

    access_log /var/log/angie/access.log noquerystring;

    location /metrics {
        return 404;
    }

    location /api/v1/auth/ {
        limit_req zone=api_auth burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    location / {
        limit_req zone=api_global burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    location /ws/ {
        limit_conn ws_conn 50;
        limit_conn_status 429;

        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
