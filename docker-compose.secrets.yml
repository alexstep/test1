# Production overlay: mount secrets as files under /run/secrets.
# File-based secrets stay out of compose env (visible in docker inspect, ps, logs).
# Usage: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up --build
#
# Create secret files under ./secrets/ (gitignored):
#   secrets/JWT_SECRET
#   secrets/METRICS_TOKEN
#   secrets/DATABASE_URL
#   secrets/DB_ENCRYPTION_KEY_V1

services:
  api-1:
    volumes:
      - ./secrets:/run/secrets:ro

  api-2:
    volumes:
      - ./secrets:/run/secrets:ro
